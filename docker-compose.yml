version: "3.9"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aforro
      POSTGRES_USER: aforro
      POSTGRES_PASSWORD: aforro
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine

  celery:
    build: .
    command: celery -A project worker --loglevel=info --pool=solo
    depends_on:
      - postgres
      - redis